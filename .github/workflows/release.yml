name: ビルド & リリース

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt pyinstaller

      - name: Inno Setup をインストール
        run: choco install innosetup --no-progress -y
        shell: pwsh

      - name: システムロケールを UTF-8 に設定
        run: chcp 65001
        shell: cmd

      - name: シークレットファイルを生成
        shell: pwsh
        env:
          OAUTH_CREDS_PY: ${{ secrets.OAUTH_CREDS_PY }}
          SECRETS_PY: ${{ secrets.SECRETS_PY }}
        run: |
          [System.IO.File]::WriteAllText("app/api/google/_oauth_creds.py", $env:OAUTH_CREDS_PY)
          [System.IO.File]::WriteAllText("app/core/_secrets.py", $env:SECRETS_PY)

      - name: バージョンを取得
        id: get_version
        shell: pwsh
        run: |
          $ver = python -c "exec(open('version.py').read()); print(__version__)"
          echo "APP_VERSION=$ver" >> $env:GITHUB_ENV
          echo "バージョン: $ver"

      - name: PyInstaller でビルド (onedir)
        shell: cmd
        run: pyinstaller lee.spec --noconfirm

      - name: ビルド出力を確認
        shell: pwsh
        run: Get-ChildItem dist\LEE\ | Select-Object Name, Length

      - name: Inno Setup でインストーラーをビルド
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$env:APP_VERSION installer.iss
          Get-ChildItem dist\installer\

      - name: SHA256 ハッシュを生成
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist\installer\LEE_Setup.exe
          $hash  = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash
          "$hash  LEE_Setup.exe" | Out-File -Encoding utf8 "dist\installer\LEE_Setup.sha256"
          Write-Output "SHA256: $hash"

      - name: GitHub リリースを作成 (ドラフト)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          files: |
            dist/installer/LEE_Setup.exe
            dist/installer/LEE_Setup.sha256
