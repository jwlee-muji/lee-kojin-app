name: ビルド & リリース

# v* タグをプッシュしたときだけ実行 (例: git tag v4.2.0 && git push origin v4.2.0)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # リリース作成に必要

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"   # 日本語ファイル名・パスを正しく処理するため

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt pyinstaller

      - name: システムロケールを UTF-8 に設定
        run: chcp 65001
        shell: cmd

      - name: PyInstaller でビルド
        shell: cmd
        run: pyinstaller lee.spec --noconfirm

      - name: EXE ファイル名を確認
        shell: pwsh
        run: Get-ChildItem dist\

      - name: SHA256 ハッシュを生成
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash
          "$hash  $($exe.Name)" | Out-File -Encoding utf8 "dist\$($exe.BaseName).sha256"
          Write-Output "SHA256: $hash"
          Write-Output "File: $($exe.Name)"

      - name: GitHub リリースを作成 (ドラフト)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          files: |
            dist/*.exe
            dist/*.sha256
