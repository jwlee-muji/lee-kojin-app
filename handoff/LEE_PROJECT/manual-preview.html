<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LEE — マニュアル ウィジェット プレビュー</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
  body {
    background: var(--bg-app);
    color: var(--fg-primary);
    font-family: var(--font-sans, -apple-system, "SF Pro Text", "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif);
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
  .lee-scroll { overflow: auto; }
  .lee-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .lee-scroll::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 4px; }
  .lee-scroll::-webkit-scrollbar-track { background: transparent; }
  .theme-toggle {
    position: fixed; top: 12px; right: 14px; z-index: 1000;
    padding: 6px 14px; border-radius: 999px;
    background: var(--bg-surface); border: 1px solid var(--border);
    color: var(--fg-primary); font-family: inherit; font-size: 11px; font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="varA-detail-atoms.jsx"></script>
<script type="text/babel" src="varA-manual-detail.jsx"></script>

<script type="text/babel">
const { ManualDetail } = window.varA_manual_detail;

function App() {
  const [dark, setDark] = React.useState(true);
  React.useEffect(() => {
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  }, [dark]);

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column' }}>
      <button className="theme-toggle" onClick={() => setDark(d => !d)}>
        {dark ? '🌙 Dark' : '☀ Light'}
      </button>
      <div className="lee-scroll" style={{ flex: 1, overflow: 'auto' }}>
        <ManualDetail onBack={() => alert('戻る (mock)')} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
